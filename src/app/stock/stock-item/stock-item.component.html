<div class="stock-container">
  <div class="stock-card">
    <div class="stock-name">{{ stock.name }} {{ stock.code }}</div>
    <div class="stock-exchange">{{ stock.exchange }}</div>
    <div
      class="stock-price"
      [class.positive]="stock.isPositiveChange()"
      [style.color]="stock.isPositiveChange() ? 'green' : 'red'"
    >
      $ {{ stock.price }}
    </div>
    <button (click)="toggleFavorite($event)">
      {{ stock.favorite ? 'Remove from Favorite' : 'Add to Favorite' }}
    </button>
  </div>
</div>
