<div class="register-container">
  <h1>REGISTER</h1>

  <form (ngSubmit)="onRegister()">
    <div class="input-group">
      <label for="user">USERNAME</label>
      <input
        type="text"
        id="user"
        name="user"
        [(ngModel)]="username"
        placeholder="Choose a username"
        required
      />
    </div>

    <div class="input-group">
      <label for="password">PASSWORD</label>
      <input
        type="password"
        id="password"
        name="password"
        [(ngModel)]="password"
        placeholder="••••••••"
        required
      />
    </div>

    <div class="input-group">
      <label for="confirmPassword">CONFIRM PASSWORD</label>
      <input
        type="password"
        id="confirmPassword"
        name="confirmPassword"
        [(ngModel)]="confirmPassword"
        placeholder="••••••••"
        required
      />
    </div>

    <button type="submit">SIGN UP</button>
  </form>

  <div class="footer">Already have an account? <a routerLink="/login">Sign in</a></div>
</div>
