<div class="login-container">
  <h1>LOGIN</h1>

  <form [formGroup]="loginForm" (ngSubmit)="onLogin()">
    <div class="input-group">
      <label for="username">USERNAME</label>
      <input
        type="text"
        id="username"
        formControlName="username"
        placeholder="username"
        [class.invalid]="loginForm.get('username')?.invalid && loginForm.get('username')?.touched"
      />
      @if (loginForm.get('username')?.invalid && loginForm.get('username')?.touched) {
        <div class="error-msg">Username is required</div>
      }
    </div>

    <div class="input-group">
      <label for="password">PASSWORD</label>
      <input
        type="password"
        id="password"
        formControlName="password"
        placeholder="••••••••"
        [class.invalid]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
      />
      @if (loginForm.get('password')?.invalid && loginForm.get('password')?.touched) {
        <div class="error-msg">Password is required</div>
      }
    </div>

    <button type="submit">SIGN IN</button>
  </form>

  <div class="divider">OR</div>
  <div class="social-login">
    <div class="social-btn">G</div>
    <div class="social-btn">F</div>
    <div class="social-btn">I</div>
  </div>
  <div class="footer">Don't have an account? <a routerLink="/register">Sign up</a></div>
</div>
