<div class="list-container">
  <div class="search-bar">
    <input
      type="text"
      placeholder="Search by name or code..."
      [(ngModel)]="searchText"
      (ngModelChange)="onSearch()"
    />
  </div>

  <div class="list-header">
    <div class="col">Code</div>
    <div class="col">Name</div>
    <div class="col">Previous Price</div>
    <div class="col">Current Price</div>
    <div class="col">Exchange</div>
    <div class="col actions-header">Actions</div>
  </div>

  <div class="list-body">
    @for (item of filteredStocks; track item.id) {
      <app-stock-item
        [stock]="item"
        (view)="openViewDialog($event)"
        (update)="openUpdateDialog($event)"
        (delete)="deleteStock($event)"
        (toggleFavorite)="onToggleFavorite($event)"
      >
      </app-stock-item>
    }
  </div>
</div>

@if (selectedStock) {
  <div class="dialog-overlay">
    <div class="dialog-box">
      <h2>Update Stock</h2>

      <div class="dialog-content">
        <label>Name</label>
        <input type="text" [(ngModel)]="selectedStock.name" />
        <label>Price</label>
        <input type="number" [(ngModel)]="selectedStock.price" />
      </div>

      <div class="dialog-actions">
        <button class="btn-cancel" (click)="closeDialog()">Close</button>
        <button class="btn-save" (click)="saveUpdate()">Save Changes</button>
      </div>
    </div>
  </div>
}
