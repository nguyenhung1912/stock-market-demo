@if (isLoggedIn) {
  <div class="app-layout">
    <nav class="navbar">
      <div class="nav-brand">StockMarket</div>

      <ul class="nav-links">
        <li><a routerLink="/stocks" routerLinkActive="active">All Stocks</a></li>
        <li><a routerLink="/favorites" routerLinkActive="active">Favorites</a></li>
        <li><a routerLink="/create" routerLinkActive="active">Create Stock</a></li>

        <li><a routerLink="/dashboard" routerLinkActive="active">Dashboard</a></li>
        <li><a routerLink="/portfolio" routerLinkActive="active">Portfolio</a></li>
        <li><a routerLink="/news" routerLinkActive="active">Market News</a></li>
      </ul>

      <div class="nav-user">
        <button class="btn-profile" routerLink="/profile" routerLinkActive="active">
          <mat-icon style="font-size: 18px; height: 18px; width: 18px">account_circle</mat-icon>
          {{ authService.getCurrentUser()?.username }}
        </button>

        <button class="btn-logout" (click)="logout()">
          <mat-icon style="font-size: 18px; height: 18px; width: 18px">logout</mat-icon>
          Logout
        </button>
      </div>
    </nav>

    <main class="main-container">
      <router-outlet></router-outlet>
    </main>
  </div>
} @else {
  <router-outlet></router-outlet>
}
